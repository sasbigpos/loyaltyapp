name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-build-admin:
    name: Lint & Build Admin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/admin/package-lock.json
      - run: npm ci
        working-directory: apps/admin
      - run: npm run build
        working-directory: apps/admin
        env:
          VITE_BASE_URL: /

  lint-and-build-member:
    name: Lint & Build Member
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/member/package-lock.json
      - run: npm ci
        working-directory: apps/member
      - run: npm run build
        working-directory: apps/member
        env:
          VITE_BASE_URL: /
